backbone:
  [[-1, 1, Conv, [16, 3, 2, None, 1]],                                          # 0
   [-1, 1, InvertedResidual, [32, 1, 2]],                                       # 1
   [-1, 1, InvertedResidual, [48, 2, 2]],                                       # 2
   [-1, 2, InvertedResidual, [48, 1, 2]],                                       # 3
   [-1, 1, InvertedResidual, [64, 2, 2]],                                       # 4
   [-1, 1, MobileViTBlockv2, [64, 96, 2, 2, 0.0, 0.0, 0.0, 2, 2, 3, 1]],     # 5  P3/8
   [-1, 1, InvertedResidual, [80, 2, 2]],                                       # 6
   [-1, 1, MobileViTBlockv2, [80, 120, 2, 4, 0.0, 0.0, 0.0, 2, 2, 3, 1]],    # 7  P4/16
   [-1, 1, InvertedResidual, [96, 2, 2]],                                       # 8
   [-1, 1, MobileViTBlockv2, [96, 144, 2, 2, 0.0, 0.0, 0.0, 2, 2, 3, 1]],    # 9  P5/32
  ]

head:
  # ── Neck bottleneck: ORIGINAL SP×3 (unchanged) ───────────────────────────
  [[-1, 1, Conv, [256, 1, 1, None, 1]],          # 10
   [-2, 1, Conv, [256, 1, 1, None, 1]],          # 11
   [-1, 1, SP, [5]],                              # 12  original SP (NOT SimSPPF)
   [-2, 1, SP, [9]],                              # 13  original SP
   [-3, 1, SP, [13]],                             # 14  original SP
   [[-1, -2, -3, -4], 1, Concat, [1]],           # 15
   [-1, 1, Conv, [256, 1, 1, None, 1]],          # 16
   [[-1, -7], 1, Concat, [1]],                   # 17
   [-1, 1, Conv, [256, 1, 1, None, 1]],          # 18  neck output (same as baseline layer 18)

   # ── Top-down: P5 → P4 ────────────────────────────────────────────────────
   [-1, 1, DeformConv2dPack, [128, 3, 1, 1, 1]], # 19  DU (unchanged)
   [-1, 1, nn.Upsample, [None, 2, 'nearest']],   # 20
   [7,  1, Conv, [128, 1, 1, None, 1]],          # 21  lateral from backbone P4
   [[-1, -2], 1, Concat, [1]],                   # 22

