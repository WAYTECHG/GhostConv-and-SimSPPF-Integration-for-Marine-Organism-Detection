   [-2, 1, Conv, [64, 1, 1, None, 1]],           # 24
   [-1, 1, GhostConv, [64, 3, 1]],               # 25  [B] GhostConv
   [-1, 1, GhostConv, [64, 3, 1]],               # 26  [B] GhostConv
   [[-1, -2, -3, -4], 1, Concat, [1]],           # 27
   [-1, 1, Conv, [128, 1, 1, None, 1]],          # 28  P4 feature

   # ── Top-down: P4 → P3 ────────────────────────────────────────────────────
   [-1, 1, DeformConv2dPack, [64, 3, 1, 1, 1]], # 29  DU (unchanged)
   [-1, 1, nn.Upsample, [None, 2, 'nearest']],   # 30
   [5,  1, Conv, [64, 1, 1, None, 1]],           # 31  lateral from backbone P3
   [[-1, -2], 1, Concat, [1]],                   # 32

   # Multi-Concat at P3: [B] GhostConv
   [-1, 1, Conv, [32, 1, 1, None, 1]],           # 33
   [-2, 1, Conv, [32, 1, 1, None, 1]],           # 34
   [-1, 1, GhostConv, [32, 3, 1]],               # 35  [B] GhostConv
   [-1, 1, GhostConv, [32, 3, 1]],               # 36  [B] GhostConv
   [[-1, -2, -3, -4], 1, Concat, [1]],           # 37
   [-1, 1, Conv, [64, 1, 1, None, 1]],           # 38  P3 output

   # ── Bottom-up: P3 → P4 ───────────────────────────────────────────────────
   [-1, 1, Conv, [128, 3, 2, None, 1]],          # 39  downsample
   [[-1, 28], 1, Concat, [1]],                   # 40

   # Multi-Concat: [B] GhostConv
   [-1, 1, Conv, [64, 1, 1, None, 1]],           # 41
   [-2, 1, Conv, [64, 1, 1, None, 1]],           # 42
   [-1, 1, GhostConv, [64, 3, 1]],               # 43  [B] GhostConv
   [-1, 1, GhostConv, [64, 3, 1]],               # 44  [B] GhostConv
   [[-1, -2, -3, -4], 1, Concat, [1]],           # 45
   [-1, 1, Conv, [128, 1, 1, None, 1]],          # 46  P4 output

   # ── Bottom-up: P4 → P5 ───────────────────────────────────────────────────
   [-1, 1, Conv, [256, 3, 2, None, 1]],          # 47  downsample
   [[-1, 18], 1, Concat, [1]],                   # 48

   # Multi-Concat: [B] GhostConv
   [-1, 1, Conv, [128, 1, 1, None, 1]],          # 49
   [-2, 1, Conv, [128, 1, 1, None, 1]],          # 50
   [-1, 1, GhostConv, [128, 3, 1]],              # 51  [B] GhostConv
   [-1, 1, GhostConv, [128, 3, 1]],              # 52  [B] GhostConv
   [[-1, -2, -3, -4], 1, Concat, [1]],           # 53
   [-1, 1, Conv, [256, 1, 1, None, 1]],          # 54  P5 output

   # ── Detection heads: identical to baseline ────────────────────────────────
   [38, 1, Conv, [128, 3, 1, None, 1]],          # 55  P3 head
   [46, 1, Conv, [256, 3, 1, None, 1]],          # 56  P4 head
   [54, 1, Conv, [512, 3, 1, None, 1]],          # 57  P5 head

   [[55, 56, 57], 1, IDetect, [nc, anchors]],    # 58  Detect(P3, P4, P5)
  ]